# This workflow checks the integrity of the installation script used in this tutorial

name: virtual-tutorial-perturbation-modelling CI

on:
  push:
    branches: [ "gg-test" ]
  pull_request:
    branches: [ "gg-test" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Run installation script and save log
        run: |
          chmod +x install_requirements.sh
          ./install_requirements.sh 2>&1 | tee install.log
        shell: bash

      - name: Upload installation log
        uses: actions/upload-artifact@v4
        with:
          name: install-log-${{ matrix.os }}
          path: install.log
