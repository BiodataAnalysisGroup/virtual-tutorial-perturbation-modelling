name: scgen
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip>=23.1
  - numpy>=1.23
  - scipy>=1.9
  - pandas>=1.5
  - scikit-learn>=1.2
  - matplotlib>=3.7
  - seaborn>=0.12
  - scanpy>=1.9
  - scvi-tools>=1.0
  - pertpy>=0.6
  - optuna>=3.3
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - ipykernel>=6.0
  - nbconvert>=7.0
  - pip:
      - scgen>=0.3.0
      - torch>=2.0  # Explicit torch version for GPU compatibility
      - leidenalg>=0.9  # Required for clustering in scanpy
